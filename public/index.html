<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pay Integration (Test Mode)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        .product-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: center; }
        .price { font-size: 24px; font-weight: bold; margin: 10px 0; }
        #google-pay-button-container { margin-top: 20px; display: flex; justify-content: center; min-height: 40px; }
        #payment-result { margin-top: 20px; padding: 15px; border-radius: 5px; background: #f0f0f0; display: none; word-wrap: break-word; }
        
        /* Ensure the container maintains height to prevent layout shift during "explosion" */
        #iframe-wrapper { width: 100%; min-height: 300px; margin-top: 20px; border: 1px dashed #ccc; }
        iframe { width: 100%; height: 300px; border: none; }
    </style>
</head>
<body>

    <h1>Checkout</h1>
    
    <div class="product-card">
        <h2>Cool Software License</h2>
        <div class="price">$19.99</div>
        <p>Purchase a lifetime license to this awesome product.</p>
        
        <div id="google-pay-button-container"></div>

        <div id="iframe-wrapper">
            <iframe id="third-party-frame" src="https://or-bibed-15.onrender.com/" allow="payment"></iframe>
        </div>
    </div>

    <div id="payment-result"></div>

    <script async src="https://pay.google.com/gp/p/js/pay.js" onload="onGooglePayLoaded()"></script>

    <script>
        /**
         * IFRAME EXPLOSION WORKAROUND
         * Detects if the user came back to this page via the Back button (bfcache).
         * If so, it nukes the iframe and reloads it to clear internal third-party history.
         */
        window.addEventListener('pageshow', function(event) {
            const iframeWrapper = document.getElementById('iframe-wrapper');
            const iframeUrl = "https://or-bibed-15.onrender.com/";

            // event.persisted is true if restored from bfcache (common in Safari)
            // navigation type 'back_forward' catches standard back button clicks
            const navEntries = performance.getEntriesByType("navigation");
            const isBackNav = navEntries.length > 0 && navEntries[0].type === 'back_forward';

            if (event.persisted || isBackNav) {
                console.log("Back navigation detected. Exploding iframe...");
                
                // 1. Remove the old iframe entirely
                iframeWrapper.innerHTML = ''; 
                
                // 2. Re-inject a fresh one after a tiny delay
                setTimeout(() => {
                    const newIframe = document.createElement('iframe');
                    newIframe.id = 'third-party-frame';
                    newIframe.src = iframeUrl;
                    newIframe.setAttribute('allow', 'payment');
                    iframeWrapper.appendChild(newIframe);
                }, 10);
            }
        });

        /* --- REST OF YOUR GOOGLE PAY LOGIC --- */

        const baseRequest = {
            apiVersion: 2,
            apiVersionMinor: 0
        };

        const allowedCardNetworks = ["AMEX", "DISCOVER", "JCB", "MASTERCARD", "VISA"];
        const allowedCardAuthMethods = ["PAN_ONLY", "CRYPTOGRAM_3DS"];

        const baseCardPaymentMethod = {
            type: 'CARD',
            parameters: {
                allowedAuthMethods: allowedCardAuthMethods,
                allowedCardNetworks: allowedCardNetworks
            }
        };

        const tokenizationSpecification = {
            type: 'PAYMENT_GATEWAY',
            parameters: {
                'gateway': 'example',
                'gatewayMerchantId': 'exampleGatewayMerchantId'
            }
        };

        const cardPaymentMethod = Object.assign(
            {},
            baseCardPaymentMethod,
            { tokenizationSpecification: tokenizationSpecification }
        );

        let paymentsClient = null;

        function getGooglePaymentsClient() {
            if (paymentsClient === null) {
                paymentsClient = new google.payments.api.PaymentsClient({ environment: 'TEST' });
            }
            return paymentsClient;
        }

        function onGooglePayLoaded() {
            const paymentsClient = getGooglePaymentsClient();
            const isReadyToPayRequest = Object.assign({}, baseRequest);
            isReadyToPayRequest.allowedPaymentMethods = [baseCardPaymentMethod];

            paymentsClient.isReadyToPay(isReadyToPayRequest)
                .then(function(response) {
                    if (response.result) {
                        addGooglePayButton();
                    }
                })
                .catch(function(err) {
                    console.error("Error determining readiness to use Google Pay: ", err);
                });
        }

        function addGooglePayButton() {
            const paymentsClient = getGooglePaymentsClient();
            const button = paymentsClient.createButton({
                onClick: onGooglePaymentButtonClicked,
                buttonType: 'buy',
                buttonSizeMode: 'fill'
            });
            document.getElementById('google-pay-button-container').appendChild(button);
        }

        function onGooglePaymentButtonClicked() {
            const paymentDataRequest = Object.assign({}, baseRequest);
            paymentDataRequest.allowedPaymentMethods = [cardPaymentMethod];
            
            paymentDataRequest.transactionInfo = {
                totalPriceStatus: 'FINAL',
                totalPrice: '19.99',
                currencyCode: 'USD',
                countryCode: 'US'
            };

            paymentDataRequest.merchantInfo = {
                merchantName: 'Example Merchant Store',
                merchantId: '12345678901234567890'
            };

            const paymentsClient = getGooglePaymentsClient();
            paymentsClient.loadPaymentData(paymentDataRequest)
                .then(function(paymentData) {
                    processPayment(paymentData);
                })
                .catch(function(err) {
                    console.error("Payment Error or User Closed Sheet: ", err);
                });
        }

        function processPayment(paymentData) {
            const paymentToken = paymentData.paymentMethodData.tokenizationData.token;
            const resultDiv = document.getElementById('payment-result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h3 style="color: green; margin-top:0;">Payment Authorized!</h3>
                <p>Google Pay returned an encrypted token.</p>
                <code>${paymentToken.substring(0, 100)}...</code>
            `;
        }
    </script>
</body>
</html>
