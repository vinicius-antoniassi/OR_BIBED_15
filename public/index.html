<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pay Integration (Test Mode)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        #google-pay-button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            min-height: 40px;
        }

        #payment-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background: #f0f0f0;
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <h1>Checkout</h1>

    <div class="product-card">
        <h2>Cool Software License</h2>
        <div class="price">$19.99</div>
        <p>Purchase a lifetime license to this awesome product.</p>

        <div id="google-pay-button-container"></div>
    </div>

    <div id="payment-result"></div>

    <script async src="https://pay.google.com/gp/p/js/pay.js" onload="onGooglePayLoaded()"></script>

    <script>
        // Internal tracking for debugging
        let instanceCounter = 0;
        let activeInstanceId = null;

        /**
         * Enhanced Logger to track instance persistence
         */
        function logToScreen(title, data, isError = false) {
            const resultDiv = document.getElementById('payment-result');
            resultDiv.style.display = 'block';

            // Create a persistent header for Instance Status if it doesn't exist
            if (!document.getElementById('instance-monitor')) {
                const monitor = document.createElement('div');
                monitor.id = 'instance-monitor';
                monitor.style.cssText = "background: #333; color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-family: monospace; font-size: 13px;";
                resultDiv.appendChild(monitor);
            }

            const monitor = document.getElementById('instance-monitor');
            monitor.innerHTML = `
        <strong>[Instance Monitor]</strong><br>
        Total Clients Created: ${instanceCounter}<br>
        Current Active ID: ${activeInstanceId || 'None'}
    `;

            // Normal log entry
            const entry = document.createElement('div');
            entry.style.cssText = `border-bottom: 1px solid #ddd; padding: 10px; background: ${isError ? '#fff0f0' : '#fff'};`;
            entry.innerHTML = `
        <small style="color: #888;">${new Date().toLocaleTimeString()}</small><br>
        <strong>${title}</strong>
        <pre style="font-size: 11px; background: #eee; padding: 5px; overflow-x: auto;">${JSON.stringify(data, null, 2)}</pre>
    `;

            // Insert after the monitor
            resultDiv.insertBefore(entry, monitor.nextSibling);
        }

        const baseRequest = { apiVersion: 2, apiVersionMinor: 0 };
        const allowedCardNetworks = ["AMEX", "DISCOVER", "JCB", "MASTERCARD", "VISA"];
        const allowedCardAuthMethods = ["PAN_ONLY", "CRYPTOGRAM_3DS"];
        const baseCardPaymentMethod = {
            type: 'CARD',
            parameters: { allowedAuthMethods: allowedCardAuthMethods, allowedCardNetworks: allowedCardNetworks }
        };

        let paymentsClient = null;

        /**
         * Modified to track instance creation
         */
        function getGooglePaymentsClient() {
            if (paymentsClient === null) {
                instanceCounter++;
                activeInstanceId = `Client_ID_${Math.floor(Math.random() * 10000)}`;

                paymentsClient = new google.payments.api.PaymentsClient({ environment: 'TEST' });

                logToScreen("NEW Client Created", {
                    instanceNumber: instanceCounter,
                    assignedId: activeInstanceId
                });
            } else {
                logToScreen("Reusing Existing Client", {
                    id: activeInstanceId
                });
            }
            return paymentsClient;
        }

        function onGooglePayLoaded() {
            logToScreen("SDK Loaded", "pay.js ready");
            const client = getGooglePaymentsClient();

            const isReadyToPayRequest = Object.assign({}, baseRequest);
            isReadyToPayRequest.allowedPaymentMethods = [baseCardPaymentMethod];

            client.isReadyToPay(isReadyToPayRequest)
                .then(res => {
                    logToScreen("Readiness Check", res);
                    if (res.result) addGooglePayButton();
                })
                .catch(err => logToScreen("Readiness Error", err, true));
        }

        function addGooglePayButton() {
            const client = getGooglePaymentsClient();
            const button = client.createButton({
                onClick: onGooglePaymentButtonClicked,
                buttonType: 'buy',
                buttonSizeMode: 'fill'
            });
            document.getElementById('google-pay-button-container').appendChild(button);
        }

        function onGooglePaymentButtonClicked() {
            logToScreen("Interaction", "Payment button clicked");
            const client = getGooglePaymentsClient();

            // Transaction logic...
            const paymentDataRequest = Object.assign({}, baseRequest);
            paymentDataRequest.allowedPaymentMethods = [
                Object.assign({}, baseCardPaymentMethod, {
                    tokenizationSpecification: {
                        type: 'PAYMENT_GATEWAY',
                        parameters: { 'gateway': 'example', 'gatewayMerchantId': 'exampleGatewayMerchantId' }
                    }
                })
            ];
            paymentDataRequest.transactionInfo = {
                totalPriceStatus: 'FINAL',
                totalPrice: '19.99',
                currencyCode: 'USD',
                countryCode: 'US'
            };
            paymentDataRequest.merchantInfo = {
                merchantName: 'Example Merchant',
                merchantId: '12345678901234567890'
            };

            client.loadPaymentData(paymentDataRequest)
                .then(data => logToScreen("Payment Success", data))
                .catch(err => logToScreen("Payment Cancelled/Error", err, true));
        }
    </script>
</body>

</html>
